server {
    listen 80 default_server;
    server_name dev.ecoloop.app _;

    # Redirect HTTP to HTTPS
    return 301 https://dev.ecoloop.app$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name dev.ecoloop.app _;

    ssl_certificate /etc/letsencrypt/live/dev.ecoloop.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.ecoloop.app/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API proxy
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # WebSocket proxy (chat)
    location /socket.io/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Swagger docs (dev only)
    location /api/docs {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (SPA)
    location / {
        root /var/www/html;
        try_files $uri $uri/ /index.html;

        # Never cache index.html — ensures new deploys reach users immediately
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # Cache hashed assets forever (Quasar adds content hash to filenames)
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
        }
    }

    # File upload limit
    client_max_body_size 50M;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
