sonar.organization=ecoloopengineering
sonar.projectKey=EcoloopEngineering_loop-platform
sonar.projectName=Loop Platform

# Sources
sonar.sources=apps/api/src,apps/web/src,packages/shared/src
sonar.tests=apps/api/src
sonar.test.inclusions=**/*.spec.ts

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/*.spec.ts,**/test/**,**/prisma/migrations/**

# Coverage
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info
sonar.typescript.lcov.reportPaths=apps/api/coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPaths=apps/api/tsconfig.json,apps/web/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
