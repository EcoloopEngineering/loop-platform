name: Deploy to Dev (Zero Downtime)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy with zero downtime
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'bash -s' << 'DEPLOY'
          set -e

          APP_DIR=/home/ubuntu/loop-platform
          RELEASES_DIR=$APP_DIR/releases
          CURRENT_LINK=$APP_DIR/current
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          NEW_RELEASE=$RELEASES_DIR/$TIMESTAMP

          echo "=== Preparing directories ==="
          mkdir -p $RELEASES_DIR
          mkdir -p $NEW_RELEASE

          echo "=== Cloning repo ==="
          git clone -b develop --single-branch https://github.com/${{ github.repository }}.git $NEW_RELEASE

          cd $NEW_RELEASE

          echo "=== Copying env files ==="
          ENV_DIR=$APP_DIR/envs
          if [ ! -f "$ENV_DIR/.env.api" ]; then
            echo "ERROR: $ENV_DIR/.env.api not found!"
            echo "Create it on the server: mkdir -p $ENV_DIR && nano $ENV_DIR/.env.api"
            exit 1
          fi
          cp $ENV_DIR/.env.api apps/api/.env
          cp $ENV_DIR/.env.web apps/web/.env 2>/dev/null || true

          echo "=== Installing dependencies ==="
          pnpm install

          echo "=== Building shared ==="
          pnpm --filter @loop/shared build

          echo "=== Building API ==="
          cd apps/api
          npx prisma generate
          npx prisma db push
          npx nest build

          echo "=== Building Frontend ==="
          cd ../web
          API_URL=http://44.202.51.163 npx quasar build

          echo "=== Switching release (atomic) ==="
          ln -sfn $NEW_RELEASE $CURRENT_LINK

          echo "=== Restarting API with PM2 ==="
          cd $CURRENT_LINK/apps/api
          pm2 delete api || true
          pm2 start dist/main.js --name api --env production
          pm2 save

          echo "=== Deploying Frontend ==="
          sudo rm -rf /var/www/html/*
          sudo cp -r $CURRENT_LINK/apps/web/dist/spa/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html/

          echo "=== Cleaning old releases ==="
          ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf

          echo "=== Deploy finished ==="
          DEPLOY

      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 5
          STATUS=$(ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/docs')
          echo "API returned: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "Deploy verified!"
          else
            echo "Deploy failed — rolling back..."

            ssh -i ~/.ssh/deploy_key ubuntu@$HOST '
              APP_DIR=/home/ubuntu/loop-platform
              RELEASES_DIR=$APP_DIR/releases
              CURRENT_LINK=$APP_DIR/current

              PREVIOUS=$(ls -dt $RELEASES_DIR/* | sed -n 2p)
              if [ -z "$PREVIOUS" ]; then
                echo "No previous version to rollback"
                exit 1
              fi

              ln -sfn $PREVIOUS $CURRENT_LINK
              cd $CURRENT_LINK/apps/api
              pm2 restart api
              echo "Rollback done"
            '

            exit 1
          fi