name: Deploy to Dev (Zero Downtime)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @loop/shared build

      - name: Build API
        run: |
          cd apps/api
          npx prisma generate
          npx nest build

      - name: Build Frontend
        run: |
          cd apps/web
          API_URL=http://44.202.51.163 npx quasar build

      - name: Create standalone API bundle
        run: |
          pnpm --filter @loop/api deploy api-bundle --prod --legacy
          cp -r apps/api/dist api-bundle/dist
          cp -r apps/api/prisma api-bundle/prisma

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Package, upload and deploy
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "=== Verifying builds ==="
          test -f api-bundle/dist/main.js || { echo "API build missing!"; exit 1; }
          test -f apps/web/dist/spa/index.html || { echo "Frontend build missing!"; exit 1; }

          echo "=== Packaging release ==="
          mkdir -p release
          mv api-bundle release/api
          mv apps/web/dist/spa release/web
          tar czf release.tar.gz -C release .
          ls -lh release.tar.gz

          echo "=== Uploading to EC2 ==="
          cat release.tar.gz | ssh -i ~/.ssh/deploy_key ubuntu@$HOST "cat > /tmp/release.tar.gz"

          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          echo "=== Deploying on EC2 ==="
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "bash -s" << ENDSCRIPT
          set -e
          export PATH=/usr/local/bin:/usr/bin:/bin:\$PATH

          APP_DIR=/home/ubuntu/loop-platform
          RELEASES_DIR=\$APP_DIR/releases
          CURRENT_LINK=\$APP_DIR/current
          NEW_RELEASE=\$RELEASES_DIR/$TIMESTAMP

          echo "--- Extracting release ---"
          mkdir -p \$NEW_RELEASE/apps
          tar xzf /tmp/release.tar.gz -C \$NEW_RELEASE/apps
          rm -f /tmp/release.tar.gz

          echo "--- Copying env ---"
          cp \$APP_DIR/envs/.env.api \$NEW_RELEASE/apps/api/.env

          echo "--- Prisma db push ---"
          cd \$NEW_RELEASE/apps/api
          prisma db push --accept-data-loss --skip-generate

          echo "--- Switching release ---"
          ln -sfn \$NEW_RELEASE \$CURRENT_LINK

          echo "--- Restarting API ---"
          cd \$CURRENT_LINK/apps/api
          pm2 delete api 2>/dev/null || true
          pm2 start dist/main.js --name api
          pm2 save

          echo "--- Deploying Frontend ---"
          sudo rm -rf /var/www/html/*
          sudo cp -r \$CURRENT_LINK/apps/web/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html/

          echo "--- Cleaning old releases ---"
          ls -dt \$RELEASES_DIR/* | tail -n +4 | xargs rm -rf 2>/dev/null || true

          echo "=== Deploy finished ==="
          pm2 list
          ENDSCRIPT

      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 8
          STATUS=$(ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/docs')
          echo "API returned: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "Deploy verified!"
          else
            echo "Deploy verification failed (status: $STATUS)"
            ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'pm2 logs api --lines 15 --nostream'
            exit 1
          fi
