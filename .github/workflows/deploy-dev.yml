name: Deploy to Dev

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$HOST 'bash -s' << 'DEPLOY'
          cd /home/ubuntu/loop-platform || exit 1

          echo "=== Pulling latest code ==="
          git fetch origin develop
          git checkout develop
          git reset --hard origin/develop

          echo "=== Installing dependencies ==="
          pnpm install || true

          echo "=== Building shared ==="
          pnpm --filter @loop/shared build || true

          echo "=== Building API ==="
          cd apps/api
          npx prisma generate || true
          npx prisma db push --accept-data-loss || true
          npx nest build || { echo "API build failed!"; exit 1; }

          echo "=== Restarting API ==="
          pkill -f "node dist/main.js" || true
          sleep 2
          nohup node dist/main.js > /home/ubuntu/api.log 2>&1 &
          sleep 5

          echo "=== Building Frontend ==="
          cd ../web
          sed -i 's|API_URL=.*|API_URL=http://44.202.51.163|' .env
          API_URL=http://44.202.51.163 npx quasar build || { echo "Frontend build failed!"; exit 1; }

          echo "=== Deploying Frontend ==="
          sudo rm -rf /var/www/html/*
          sudo cp -r dist/spa/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html/

          echo "=== Deploy complete ==="
          DEPLOY

      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 5
          STATUS=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ubuntu@$HOST 'curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/docs')
          echo "API returned: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "Deploy verified!"
          else
            echo "Deploy check returned $STATUS — showing logs:"
            ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'tail -20 /home/ubuntu/api.log' || true
            exit 1
          fi
