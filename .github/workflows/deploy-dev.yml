name: Deploy to Develop

on:
  workflow_run:
    workflows: ["CI"]
    branches: [develop]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @loop/shared build

      - name: Build API
        run: |
          cd apps/api
          npx prisma generate
          npx nest build

      - name: Build Frontend
        run: |
          cd apps/web
          API_URL=http://44.202.51.163 npx quasar build

      - name: Create standalone API bundle
        run: |
          pnpm --filter @loop/api deploy api-bundle --prod --legacy
          cp -r apps/api/dist api-bundle/dist
          cp -r apps/api/prisma api-bundle/prisma
          PRISMA_GENERATED=$(find node_modules/.pnpm -path "*/@prisma+client@*/node_modules/.prisma" -type d | head -1)
          if [ -n "$PRISMA_GENERATED" ]; then
            cp -r "$PRISMA_GENERATED" api-bundle/node_modules/.prisma
            echo "Copied .prisma/client from $PRISMA_GENERATED"
          else
            echo "WARNING: .prisma/client not found!"
          fi

      - name: Verify builds
        run: |
          test -f api-bundle/dist/main.js || { echo "API dist/main.js missing!"; exit 1; }
          test -d api-bundle/node_modules/.prisma/client || { echo ".prisma/client missing!"; exit 1; }
          test -f apps/web/dist/spa/index.html || { echo "Frontend index.html missing!"; exit 1; }
          echo "All builds verified"

      - name: Package release
        run: |
          mkdir -p release
          mv api-bundle release/api
          mv apps/web/dist/spa release/web
          tar czf release.tar.gz -C release .
          ls -lh release.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Upload release
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          cat release.tar.gz | ssh -i ~/.ssh/deploy_key ubuntu@$HOST "cat > /tmp/release.tar.gz"
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "ls -lh /tmp/release.tar.gz"

      - name: Create deploy script
        run: |
          cat > /tmp/deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          TIMESTAMP=$1

          APP_DIR=/home/ubuntu/loop-platform
          RELEASES_DIR=$APP_DIR/releases
          CURRENT_LINK=$APP_DIR/current
          NEW_RELEASE=$RELEASES_DIR/$TIMESTAMP

          echo "--- Extracting release ---"
          mkdir -p $NEW_RELEASE/apps
          tar xzf /tmp/release.tar.gz -C $NEW_RELEASE/apps
          rm -f /tmp/release.tar.gz

          echo "--- Copying env ---"
          if [ ! -f "$APP_DIR/envs/.env.api" ]; then
            echo "ERROR: $APP_DIR/envs/.env.api not found!"
            exit 1
          fi
          cp $APP_DIR/envs/.env.api $NEW_RELEASE/apps/api/.env

          echo "--- Prisma db push ---"
          cd $NEW_RELEASE/apps/api
          prisma db push --accept-data-loss --skip-generate

          echo "--- Stopping old API ---"
          pm2 kill 2>/dev/null || true
          sleep 2
          fuser -k 3000/tcp 2>/dev/null || true
          sleep 1

          echo "--- Switching release ---"
          ln -sfn $NEW_RELEASE $CURRENT_LINK

          echo "--- Starting API ---"
          cd $CURRENT_LINK/apps/api
          pm2 start dist/main.js --name api --cwd $CURRENT_LINK/apps/api
          pm2 save

          echo "--- Deploying Frontend ---"
          sudo mkdir -p /var/www/html /usr/share/nginx/html
          sudo rm -rf /var/www/html/* /usr/share/nginx/html/*
          sudo cp -r $CURRENT_LINK/apps/web/* /var/www/html/
          sudo cp -r $CURRENT_LINK/apps/web/* /usr/share/nginx/html/
          sudo chown -R www-data:www-data /var/www/html/ /usr/share/nginx/html/

          echo "--- Cleaning old releases ---"
          ls -dt $RELEASES_DIR/* | tail -n +4 | xargs rm -rf 2>/dev/null || true

          echo "=== Deploy finished ==="
          pm2 list
          SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Deploy on EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          cat /tmp/deploy.sh | ssh -i ~/.ssh/deploy_key ubuntu@$HOST "cat > /tmp/deploy.sh && chmod +x /tmp/deploy.sh"
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "bash /tmp/deploy.sh $TIMESTAMP"

      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 8
          STATUS=$(ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/v1/health')
          echo "Health check: $STATUS"

          HEALTH=$(ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'curl -s http://localhost:3000/api/v1/health')
          echo "Response: $HEALTH"

          if echo "$HEALTH" | grep -q '"status":"ok"'; then
            echo "Deploy verified — API healthy!"
          else
            echo "Deploy verification failed"
            ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'pm2 logs api --lines 20 --nostream'
            exit 1
          fi
