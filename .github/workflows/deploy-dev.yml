name: Deploy to Dev (Zero Downtime)

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build shared
        run: pnpm --filter @loop/shared build

      - name: Build API
        run: |
          cd apps/api
          npx prisma generate
          npx nest build

      - name: Build Frontend
        run: |
          cd apps/web
          API_URL=http://44.202.51.163 npx quasar build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "StrictHostKeyChecking no" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Package and upload release
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "=== Packaging release ==="
          ls -la apps/api/dist/main.js
          ls -la apps/web/dist/spa/index.html

          tar czf release.tar.gz \
            apps/api/dist/ \
            apps/api/prisma/ \
            apps/api/package.json \
            apps/web/dist/spa/ \
            packages/shared/dist/ \
            packages/shared/package.json \
            package.json \
            pnpm-workspace.yaml \
            pnpm-lock.yaml

          echo "=== Uploading to EC2 ==="
          ls -lh release.tar.gz
          cat release.tar.gz | ssh -i ~/.ssh/deploy_key ubuntu@$HOST "cat > /tmp/release.tar.gz"
          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "ls -lh /tmp/release.tar.gz"

      - name: Deploy on EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)

          ssh -i ~/.ssh/deploy_key ubuntu@$HOST "bash -s $TIMESTAMP" << 'DEPLOY'
          set -e
          TIMESTAMP=$1

          APP_DIR=/home/ubuntu/loop-platform
          RELEASES_DIR=$APP_DIR/releases
          CURRENT_LINK=$APP_DIR/current
          NEW_RELEASE=$RELEASES_DIR/$TIMESTAMP

          echo "=== Preparing release directory ==="
          mkdir -p $NEW_RELEASE

          echo "=== Extracting release ==="
          tar xzf /tmp/release.tar.gz -C $NEW_RELEASE
          rm /tmp/release.tar.gz

          echo "=== Copying env files ==="
          ENV_DIR=$APP_DIR/envs
          if [ ! -f "$ENV_DIR/.env.api" ]; then
            echo "ERROR: $ENV_DIR/.env.api not found!"
            exit 1
          fi
          cp $ENV_DIR/.env.api $NEW_RELEASE/apps/api/.env
          cp $ENV_DIR/.env.web $NEW_RELEASE/apps/web/.env 2>/dev/null || true

          echo "=== Installing production dependencies ==="
          cd $NEW_RELEASE
          pnpm install --prod

          echo "=== Running Prisma migrations ==="
          cd $NEW_RELEASE/apps/api
          npx prisma generate
          npx prisma db push --accept-data-loss

          echo "=== Switching release (atomic) ==="
          ln -sfn $NEW_RELEASE $CURRENT_LINK

          echo "=== Restarting API with PM2 ==="
          cd $CURRENT_LINK/apps/api
          pm2 delete api || true
          pm2 start dist/main.js --name api
          pm2 save

          echo "=== Deploying Frontend ==="
          sudo rm -rf /var/www/html/*
          sudo cp -r $CURRENT_LINK/apps/web/dist/spa/* /var/www/html/
          sudo chown -R www-data:www-data /var/www/html/

          echo "=== Cleaning old releases ==="
          ls -dt $RELEASES_DIR/* | tail -n +6 | xargs rm -rf 2>/dev/null || true

          echo "=== Deploy finished ==="
          DEPLOY

      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 5
          STATUS=$(ssh -i ~/.ssh/deploy_key ubuntu@$HOST 'curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/docs')
          echo "API returned: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "Deploy verified!"
          else
            echo "Deploy failed — rolling back..."

            ssh -i ~/.ssh/deploy_key ubuntu@$HOST '
              APP_DIR=/home/ubuntu/loop-platform
              RELEASES_DIR=$APP_DIR/releases
              CURRENT_LINK=$APP_DIR/current

              PREVIOUS=$(ls -dt $RELEASES_DIR/* | sed -n 2p)
              if [ -z "$PREVIOUS" ]; then
                echo "No previous version to rollback"
                exit 1
              fi

              ln -sfn $PREVIOUS $CURRENT_LINK
              cd $CURRENT_LINK/apps/api
              pm2 restart api
              echo "Rollback done"
            '

            exit 1
          fi
