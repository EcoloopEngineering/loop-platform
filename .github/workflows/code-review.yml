name: Claude Code Review

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # API overload (529) should never block a PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.vue' '*.scss' | head -3000)
          echo "diff<<ENDDIFF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "ENDDIFF" >> $GITHUB_OUTPUT

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-haiku-4-5-20251001
          direct_prompt: |
            Review this pull request for the Loop Platform (NestJS + Vue 3 + Quasar).

            Focus on:
            1. **Bugs**: Logic errors, null/undefined risks, race conditions
            2. **Security**: SQL injection, XSS, auth bypasses, exposed secrets
            3. **Performance**: N+1 queries, memory leaks, unnecessary re-renders
            4. **Best practices**: NestJS/Vue patterns, error handling, typing

            Be concise. Only comment on real issues, not style preferences.
            If the code looks good, say so briefly.

            PR: ${{ github.event.pull_request.title }}
            Files changed: ${{ github.event.pull_request.changed_files }}
